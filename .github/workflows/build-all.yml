name: Build All Platforms

permissions:
  contents: write

on:
  push:
    branches: [ master, main ]
    tags:
      - 'v*'
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build-server:
    name: Build Server
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Rust
      uses: dtolnay/rust-toolchain@nightly

    - name: Cache cargo registry
      uses: actions/cache@v4
      with:
        path: ~/.cargo/registry
        key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

    - name: Cache cargo index
      uses: actions/cache@v4
      with:
        path: ~/.cargo/git
        key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}

    - name: Cache cargo build
      uses: actions/cache@v4
      with:
        path: voice-input-server/target
        key: ${{ runner.os }}-cargo-build-target-${{ hashFiles('**/Cargo.lock') }}

    - name: Build Server
      working-directory: voice-input-server
      run: cargo build --release

    - name: Prepare server release asset
      run: |
        mkdir -p release-assets/server
        cp voice-input-server/target/release/voice-input-server release-assets/server/voiceinput-server-linux-x64-v${GITHUB_REF_NAME#v}

    - name: Upload Server Binary
      uses: actions/upload-artifact@v4
      with:
        name: voiceinput-server-linux-x64
        path: release-assets/server/*
        if-no-files-found: error

  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
        cache: 'gradle'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Grant execute permission for gradlew
      working-directory: VoiceInputApp
      run: chmod +x gradlew

    - name: Create keystore
      working-directory: VoiceInputApp
      run: |
        keytool -genkey -v -keystore voiceinput.keystore \
          -alias voiceinput -keyalg RSA -keysize 2048 -validity 10000 \
          -storepass password123 -keypass password123 \
          -dname "CN=VoiceInput, OU=Dev, O=VoiceInput, L=City, S=State, C=CN"

    - name: Build APK
      working-directory: VoiceInputApp
      run: ./gradlew assembleRelease

    - name: Prepare Android release asset
      working-directory: VoiceInputApp
      run: |
        mkdir -p release-assets
        cp app/build/outputs/apk/release/*.apk release-assets/voiceinput-android-v${GITHUB_REF_NAME#v}.apk

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: voiceinput-android-release
        path: VoiceInputApp/release-assets/voiceinput-android-v*.apk
        if-no-files-found: error

  build-desktop:
    name: Build Desktop - ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'windows-latest'
            os: 'windows'
            arch: 'x64'
            rust_target: 'x86_64-pc-windows-msvc'
          - platform: 'macos-latest'
            os: 'macos'
            arch: 'x64'
            rust_target: 'x86_64-apple-darwin'
          - platform: 'macos-latest'
            os: 'macos'
            arch: 'arm64'
            rust_target: 'aarch64-apple-darwin'
          - platform: 'ubuntu-22.04'
            os: 'linux'
            arch: 'x64'
            rust_target: 'x86_64-unknown-linux-gnu'

    runs-on: ${{ matrix.platform }}

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: voice-input-desktop/package-lock.json

    - name: Setup Rust
      uses: dtolnay/rust-toolchain@nightly

    - name: Install dependencies (Ubuntu)
      if: matrix.os == 'linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y libwebkit2gtk-4.1-dev \
          build-essential \
          curl \
          wget \
          file \
          libxdo-dev \
          libssl-dev \
          libayatana-appindicator3-dev \
          librsvg2-dev

    - name: Add Rust target
      run: rustup target add ${{ matrix.rust_target }}

    - name: Cache cargo registry
      uses: actions/cache@v4
      with:
        path: ~/.cargo/registry
        key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

    - name: Cache cargo index
      uses: actions/cache@v4
      with:
        path: ~/.cargo/git
        key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}

    - name: Cache cargo build
      uses: actions/cache@v4
      with:
        path: voice-input-desktop/src-tauri/target
        key: ${{ runner.os }}-${{ matrix.arch }}-cargo-build-${{ hashFiles('**/Cargo.lock') }}

    - name: Verify Rust target after cache
      run: |
        rustup target list --installed
        rustup target add ${{ matrix.rust_target }}
        rustup target list --installed

    - name: Install frontend dependencies
      working-directory: voice-input-desktop
      run: npm ci

    - name: Install Tauri CLI
      run: npm install -g @tauri-apps/cli@latest

    - name: Build Tauri App (Windows)
      if: matrix.os == 'windows'
      working-directory: voice-input-desktop
      run: npm run tauri build

    - name: Build Tauri App (macOS/Linux)
      if: matrix.os != 'windows'
      working-directory: voice-input-desktop
      run: npm run tauri build -- --target ${{ matrix.rust_target }}
      shell: bash

    - name: Prepare Windows release assets
      if: matrix.os == 'windows'
      shell: bash
      run: |
        mkdir -p voice-input-desktop/release-assets
        for file in voice-input-desktop/src-tauri/target/release/bundle/msi/*.msi; do
          [ -e "$file" ] || continue
          cp "$file" "voice-input-desktop/release-assets/voiceinput-desktop-windows-${{ matrix.arch }}-v${GITHUB_REF_NAME#v}.msi"
        done
        for file in voice-input-desktop/src-tauri/target/release/bundle/nsis/*.exe; do
          [ -e "$file" ] || continue
          cp "$file" "voice-input-desktop/release-assets/voiceinput-desktop-windows-${{ matrix.arch }}-v${GITHUB_REF_NAME#v}-setup.exe"
        done

    - name: Prepare macOS release assets
      if: matrix.os == 'macos'
      shell: bash
      run: |
        mkdir -p voice-input-desktop/release-assets
        for file in voice-input-desktop/src-tauri/target/${{ matrix.rust_target }}/release/bundle/dmg/*.dmg; do
          [ -e "$file" ] || continue
          cp "$file" "voice-input-desktop/release-assets/voiceinput-desktop-macos-${{ matrix.arch }}-v${GITHUB_REF_NAME#v}.dmg"
        done

    - name: Prepare Linux release assets
      if: matrix.os == 'linux'
      shell: bash
      run: |
        mkdir -p voice-input-desktop/release-assets
        for file in voice-input-desktop/src-tauri/target/${{ matrix.rust_target }}/release/bundle/deb/*.deb; do
          [ -e "$file" ] || continue
          cp "$file" "voice-input-desktop/release-assets/voiceinput-desktop-linux-${{ matrix.arch }}-v${GITHUB_REF_NAME#v}.deb"
        done
        for file in voice-input-desktop/src-tauri/target/${{ matrix.rust_target }}/release/bundle/appimage/*.AppImage; do
          [ -e "$file" ] || continue
          cp "$file" "voice-input-desktop/release-assets/voiceinput-desktop-linux-${{ matrix.arch }}-v${GITHUB_REF_NAME#v}.AppImage"
        done

    - name: Upload Windows Installer
      if: matrix.os == 'windows'
      uses: actions/upload-artifact@v4
      with:
        name: voiceinput-desktop-windows-${{ matrix.arch }}
        path: voice-input-desktop/release-assets/*
        if-no-files-found: warn

    - name: Upload macOS DMG
      if: matrix.os == 'macos'
      uses: actions/upload-artifact@v4
      with:
        name: voiceinput-desktop-macos-${{ matrix.arch }}
        path: voice-input-desktop/release-assets/*
        if-no-files-found: warn

    - name: Upload Linux Packages
      if: matrix.os == 'linux'
      uses: actions/upload-artifact@v4
      with:
        name: voiceinput-desktop-linux-${{ matrix.arch }}
        path: voice-input-desktop/release-assets/*
        if-no-files-found: warn

  create-release:
    name: Create Release
    needs: [build-server, build-android, build-desktop]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts

    - name: Display structure of downloaded files
      run: ls -R artifacts

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: artifacts/**/*
        draft: false
        prerelease: false
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
