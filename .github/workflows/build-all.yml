name: Build All Platforms

on:
  push:
    branches: [ master, main ]
    tags:
      - 'v*'
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build-server:
    name: Build Server
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Rust
      uses: dtolnay/rust-toolchain@nightly
    
    - name: Cache cargo registry
      uses: actions/cache@v4
      with:
        path: ~/.cargo/registry
        key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
    
    - name: Cache cargo index
      uses: actions/cache@v4
      with:
        path: ~/.cargo/git
        key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}
    
    - name: Cache cargo build
      uses: actions/cache@v4
      with:
        path: voice-input-server/target
        key: ${{ runner.os }}-cargo-build-target-${{ hashFiles('**/Cargo.lock') }}
    
    - name: Build Server
      working-directory: voice-input-server
      run: cargo build --release
    
    - name: Upload Server Binary
      uses: actions/upload-artifact@v4
      with:
        name: voice-input-server-linux-amd64
        path: voice-input-server/target/release/voice-input-server
        if-no-files-found: error

  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
        cache: 'gradle'
    
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
    
    - name: Grant execute permission for gradlew
      working-directory: VoiceInputApp
      run: chmod +x gradlew
    
    - name: Create keystore
      working-directory: VoiceInputApp
      run: |
        keytool -genkey -v -keystore voiceinput.keystore \
          -alias voiceinput -keyalg RSA -keysize 2048 -validity 10000 \
          -storepass password123 -keypass password123 \
          -dname "CN=VoiceInput, OU=Dev, O=VoiceInput, L=City, S=State, C=CN"
    
    - name: Build APK
      working-directory: VoiceInputApp
      run: ./gradlew assembleRelease
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: voice-input-android-apk
        path: VoiceInputApp/app/build/outputs/apk/release/*.apk
        if-no-files-found: error

  build-desktop:
    name: Build Desktop - ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'windows-latest'
            os: 'windows'
            arch: 'x86_64'
            rust_target: 'x86_64-pc-windows-msvc'
          - platform: 'macos-latest'
            os: 'macos'
            arch: 'x86_64'
            rust_target: 'x86_64-apple-darwin'
          - platform: 'macos-latest'
            os: 'macos'
            arch: 'aarch64'
            rust_target: 'aarch64-apple-darwin'
          - platform: 'ubuntu-22.04'
            os: 'linux'
            arch: 'x86_64'
            rust_target: 'x86_64-unknown-linux-gnu'
    
    runs-on: ${{ matrix.platform }}
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: voice-input-desktop/package-lock.json
    
    - name: Setup Rust
      uses: dtolnay/rust-toolchain@nightly
    
    - name: Install dependencies (Ubuntu)
      if: matrix.os == 'linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y libwebkit2gtk-4.1-dev \
          build-essential \
          curl \
          wget \
          file \
          libxdo-dev \
          libssl-dev \
          libayatana-appindicator3-dev \
          librsvg2-dev
    
    - name: Install ARM64 cross-compilation tools (Ubuntu ARM64)
      if: matrix.os == 'linux' && matrix.arch == 'aarch64'
      run: |
        sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu
        echo "CC_aarch64_unknown_linux_gnu=aarch64-linux-gnu-gcc" >> $GITHUB_ENV
        echo "CXX_aarch64_unknown_linux_gnu=aarch64-linux-gnu-g++" >> $GITHUB_ENV
        echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV
    
    - name: Add Rust target
      run: rustup target add ${{ matrix.rust_target }}
    
    - name: Cache cargo registry
      uses: actions/cache@v4
      with:
        path: ~/.cargo/registry
        key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
    
    - name: Cache cargo index
      uses: actions/cache@v4
      with:
        path: ~/.cargo/git
        key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}
    
    - name: Cache cargo build
      uses: actions/cache@v4
      with:
        path: voice-input-desktop/src-tauri/target
        key: ${{ runner.os }}-${{ matrix.arch }}-cargo-build-${{ hashFiles('**/Cargo.lock') }}
    
    - name: Verify Rust target after cache
      run: |
        echo "Checking installed targets..."
        rustup target list --installed
        echo "Re-adding target to ensure it's available..."
        rustup target add ${{ matrix.rust_target }}
        echo "Final verification:"
        rustup target list --installed
    
    - name: Install frontend dependencies
      working-directory: voice-input-desktop
      run: npm ci
    
    - name: Install Tauri CLI
      run: npm install -g @tauri-apps/cli@latest

    - name: Build Tauri App (Windows)
      if: matrix.os == 'windows'
      working-directory: voice-input-desktop
      run: npm run tauri build
    
    - name: Build Tauri App (macOS/Linux ARM64)
      if: matrix.os != 'windows' && matrix.arch == 'aarch64'
      working-directory: voice-input-desktop
      run: npm run tauri build -- --target ${{ matrix.rust_target }}
      shell: bash
    
    - name: Build Tauri App (macOS/Linux x86_64)
      if: matrix.os != 'windows' && matrix.arch == 'x86_64'
      working-directory: voice-input-desktop
      run: npm run tauri build -- --target ${{ matrix.rust_target }}
      shell: bash
    
    - name: Upload Windows Installer
      if: matrix.os == 'windows'
      uses: actions/upload-artifact@v4
      with:
        name: voice-input-desktop-windows-${{ matrix.arch }}
        path: |
          voice-input-desktop/src-tauri/target/release/bundle/msi/*.msi
          voice-input-desktop/src-tauri/target/release/bundle/nsis/*.exe
        if-no-files-found: warn
    
    - name: Upload macOS DMG
      if: matrix.os == 'macos'
      uses: actions/upload-artifact@v4
      with:
        name: voice-input-desktop-macos-${{ matrix.arch }}
        path: voice-input-desktop/src-tauri/target/${{ matrix.rust_target }}/release/bundle/dmg/*.dmg
        if-no-files-found: warn
    
    - name: Upload Linux Packages
      if: matrix.os == 'linux'
      uses: actions/upload-artifact@v4
      with:
        name: voice-input-desktop-linux-${{ matrix.arch }}
        path: |
          voice-input-desktop/src-tauri/target/${{ matrix.rust_target }}/release/bundle/deb/*.deb
          voice-input-desktop/src-tauri/target/${{ matrix.rust_target }}/release/bundle/appimage/*.AppImage
        if-no-files-found: warn

  create-release:
    name: Create Release
    needs: [build-server, build-android, build-desktop]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    
    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts
    
    - name: Display structure of downloaded files
      run: ls -R artifacts
    
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: artifacts/**/*
        draft: false
        prerelease: false
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}


