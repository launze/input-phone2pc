name: Build File QR GUI

permissions:
  contents: write

on:
  push:
    branches: [ master, main ]
    tags:
      - 'v*'
    paths:
      - 'voice-input-file-qr-gui/**'
      - 'VoiceInputApp/app/src/main/cpp/libcimbar/**'
      - '.github/workflows/build-file-qr-gui.yml'
  pull_request:
    branches: [ master, main ]
    paths:
      - 'voice-input-file-qr-gui/**'
      - 'VoiceInputApp/app/src/main/cpp/libcimbar/**'
      - '.github/workflows/build-file-qr-gui.yml'
  workflow_dispatch:

env:
  PACKAGE_VERSION: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || format('dev-{0}', github.run_number) }}

jobs:
  build-windows:
    name: Build Windows ${{ matrix.arch }}
    runs-on: windows-2022
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            cmake_arch: x64
            triplet: x64-windows-static
          - arch: x86
            cmake_arch: Win32
            triplet: x86-windows-static

    steps:
      - uses: actions/checkout@v4

      - name: Cache vcpkg
        uses: actions/cache@v4
        with:
          path: |
            ${{ runner.temp }}\vcpkg\installed
            ${{ runner.temp }}\vcpkg\downloads
            ${{ runner.temp }}\vcpkg\buildtrees
          key: file-qr-gui-vcpkg-${{ runner.os }}-${{ matrix.triplet }}-${{ hashFiles('voice-input-file-qr-gui/CMakeLists.txt') }}
          restore-keys: |
            file-qr-gui-vcpkg-${{ runner.os }}-${{ matrix.triplet }}-

      - name: Install dependencies
        shell: pwsh
        run: |
          $vcpkgRoot = Join-Path $env:RUNNER_TEMP 'vcpkg'
          if (!(Test-Path (Join-Path $vcpkgRoot 'bootstrap-vcpkg.bat'))) {
            if (Test-Path $vcpkgRoot) {
              Remove-Item -Recurse -Force $vcpkgRoot
            }
            git clone https://github.com/microsoft/vcpkg.git $vcpkgRoot
          }
          & "$vcpkgRoot\bootstrap-vcpkg.bat"
          & "$vcpkgRoot\vcpkg.exe" install "wxwidgets:${{ matrix.triplet }}" "opencv4[png,jpeg]:${{ matrix.triplet }}"
          "VCPKG_ROOT=$vcpkgRoot" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Configure
        shell: pwsh
        run: |
          cmake -S voice-input-file-qr-gui -B "build/file-qr-gui-${{ matrix.arch }}" `
            -G "Visual Studio 17 2022" `
            -A "${{ matrix.cmake_arch }}" `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake" `
            -DVCPKG_TARGET_TRIPLET="${{ matrix.triplet }}"

      - name: Build
        shell: pwsh
        run: cmake --build "build/file-qr-gui-${{ matrix.arch }}" --config Release --parallel

      - name: Package
        shell: pwsh
        run: |
          $version = "${env:PACKAGE_VERSION}".TrimStart('v')
          $packageName = "voiceinput-file-qr-gui-windows-${{ matrix.arch }}-v$version"
          $packageDir = Join-Path "release-assets" $packageName
          New-Item -ItemType Directory -Force -Path $packageDir | Out-Null
          Copy-Item "build/file-qr-gui-${{ matrix.arch }}/Release/voiceinput-file-qr-gui.exe" $packageDir
          Copy-Item "voice-input-file-qr-gui/README.md" $packageDir
          Compress-Archive -Path "$packageDir/*" -DestinationPath "release-assets/$packageName.zip" -CompressionLevel Optimal

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: voiceinput-file-qr-gui-windows-${{ matrix.arch }}
          path: release-assets/voiceinput-file-qr-gui-windows-${{ matrix.arch }}-v*.zip
          if-no-files-found: error

  build-linux:
    name: Build Linux ${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    container:
      image: ubuntu:20.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            runner: ubuntu-24.04
            triplet: x64-linux-static-gui
          - arch: arm64
            runner: ubuntu-24.04-arm
            triplet: arm64-linux-static-gui

    steps:
      - name: Prepare container
        run: |
          apt-get update
          DEBIAN_FRONTEND=noninteractive apt-get install -y git ca-certificates

      - uses: actions/checkout@v4

      - name: Setup Python for vcpkg
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          apt-get update
          DEBIAN_FRONTEND=noninteractive apt-get install -y \
            build-essential \
            cmake \
            curl \
            ninja-build \
            pkg-config \
            python3-venv \
            python3-pip \
            tar \
            unzip \
            zip \
            zstd \
            autoconf \
            autoconf-archive \
            automake \
            autopoint \
            bison \
            gperf \
            libtool \
            libltdl-dev \
            m4 \
            libx11-dev \
            libxext-dev \
            libxrender-dev \
            libxrandr-dev \
            libxinerama-dev \
            libxcursor-dev \
            libxi-dev \
            libxfixes-dev \
            xz-utils \
            libgl1-mesa-dev \
            libglu1-mesa-dev \
            libgtk-3-dev

      - name: Install Autoconf 2.72
        run: |
          curl -fsSL https://ftp.gnu.org/gnu/autoconf/autoconf-2.72.tar.xz -o /tmp/autoconf-2.72.tar.xz
          tar -xf /tmp/autoconf-2.72.tar.xz -C /tmp
          cd /tmp/autoconf-2.72
          ./configure --prefix=/usr/local
          make -j"$(nproc)"
          make install
          autoconf --version

      - name: Cache vcpkg
        uses: actions/cache@v4
        with:
          path: |
            ${{ runner.temp }}/vcpkg/installed
            ${{ runner.temp }}/vcpkg/downloads
            ${{ runner.temp }}/vcpkg/buildtrees
          key: file-qr-gui-vcpkg-${{ runner.os }}-${{ matrix.arch }}-${{ matrix.triplet }}-ubuntu20-autoconf272-python311-wx-core-${{ hashFiles('voice-input-file-qr-gui/CMakeLists.txt') }}
          restore-keys: |
            file-qr-gui-vcpkg-${{ runner.os }}-${{ matrix.arch }}-${{ matrix.triplet }}-ubuntu20-autoconf272-python311-wx-core-

      - name: Install vcpkg dependencies
        shell: bash
        run: |
          python3 --version
          which python3
          export Python3_EXECUTABLE="$(which python3)"
          export Python3_ROOT_DIR="$(dirname "$(dirname "$Python3_EXECUTABLE")")"
          vcpkg_root="$RUNNER_TEMP/vcpkg"
          if [ ! -x "$vcpkg_root/vcpkg" ]; then
            rm -rf "$vcpkg_root"
            git clone https://github.com/microsoft/vcpkg.git "$vcpkg_root"
          fi
          "$vcpkg_root/bootstrap-vcpkg.sh"
          mkdir -p "$RUNNER_TEMP/vcpkg-triplets"
          cat > "$RUNNER_TEMP/vcpkg-triplets/${{ matrix.triplet }}.cmake" <<'EOF'
          set(VCPKG_TARGET_ARCHITECTURE $ENV{VCPKG_TARGET_ARCH})
          set(VCPKG_CRT_LINKAGE dynamic)
          set(VCPKG_LIBRARY_LINKAGE static)
          set(VCPKG_CMAKE_SYSTEM_NAME Linux)
          set(X_VCPKG_FORCE_VCPKG_X_LIBRARIES ON)
          if(DEFINED ENV{Python3_EXECUTABLE})
            set(Python3_EXECUTABLE "$ENV{Python3_EXECUTABLE}" CACHE FILEPATH "")
            set(Python_EXECUTABLE "$ENV{Python3_EXECUTABLE}" CACHE FILEPATH "")
          endif()
          EOF
          export VCPKG_TARGET_ARCH="${{ matrix.arch == 'arm64' && 'arm64' || 'x64' }}"
          "$vcpkg_root/vcpkg" install \
            "wxwidgets[core]:${{ matrix.triplet }}" \
            "opencv4[png,jpeg]:${{ matrix.triplet }}" \
            --overlay-triplets="$RUNNER_TEMP/vcpkg-triplets"
          echo "VCPKG_ROOT=$vcpkg_root" >> "$GITHUB_ENV"
          echo "VCPKG_OVERLAY_TRIPLETS=$RUNNER_TEMP/vcpkg-triplets" >> "$GITHUB_ENV"

      - name: Configure
        run: |
          cmake -S voice-input-file-qr-gui -B "build/file-qr-gui-linux-${{ matrix.arch }}" \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_EXE_LINKER_FLAGS="-static-libstdc++ -static-libgcc" \
            -DCMAKE_TOOLCHAIN_FILE="$VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake" \
            -DVCPKG_TARGET_TRIPLET="${{ matrix.triplet }}" \
            -DVCPKG_OVERLAY_TRIPLETS="$VCPKG_OVERLAY_TRIPLETS"

      - name: Build
        run: cmake --build "build/file-qr-gui-linux-${{ matrix.arch }}" --config Release --parallel

      - name: Package
        shell: bash
        run: |
          version="${PACKAGE_VERSION#v}"
          package_name="voiceinput-file-qr-gui-linux-${{ matrix.arch }}-v${version}"
          package_dir="release-assets/${package_name}"
          mkdir -p "${package_dir}"
          cp "build/file-qr-gui-linux-${{ matrix.arch }}/voiceinput-file-qr-gui" "${package_dir}/"
          cp "voice-input-file-qr-gui/README.md" "${package_dir}/"
          strip "${package_dir}/voiceinput-file-qr-gui" || true
          tar -czf "release-assets/${package_name}.tar.gz" -C "release-assets" "${package_name}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: voiceinput-file-qr-gui-linux-${{ matrix.arch }}
          path: release-assets/voiceinput-file-qr-gui-linux-${{ matrix.arch }}-v*.tar.gz
          if-no-files-found: error

  create-release:
    name: Upload Release Assets
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/**/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
